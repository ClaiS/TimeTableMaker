services:
  db:
    image: postgres:16-alpine
    container_name: timetablemaker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: timetablemaker
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d timetablemaker"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: timetablemaker_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads       # lưu file upload tạm thời
      - paddle_models:/root/.paddleocr  # cache model PaddleOCR
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  paddle_models:
